<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>v05 · Sound Wave Echo — Grupo Malory</title>
<link rel="stylesheet" href="../shared/base.css">
<style>
body { background: oklch(0.10 0.03 260); color: var(--paper); }
.wave {
  position: relative; width: 100vw; height: 100vh; overflow: hidden;
  background:
    radial-gradient(circle at center, oklch(0.18 0.10 262) 0%, oklch(0.10 0.04 260) 60%, oklch(0.06 0.02 258) 100%);
}
.ripples {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid oklch(0.65 0.18 260 / 0.3);
  animation: ringExpand 6s ease-out infinite;
  opacity: 0;
}
.ring:nth-child(1) { animation-delay: 0s; }
.ring:nth-child(2) { animation-delay: 1.2s; }
.ring:nth-child(3) { animation-delay: 2.4s; }
.ring:nth-child(4) { animation-delay: 3.6s; }
.ring:nth-child(5) { animation-delay: 4.8s; }
@keyframes ringExpand {
  0% { width: 200px; height: 200px; opacity: 0; border-color: oklch(0.7 0.2 260 / 0.7); }
  20% { opacity: 1; }
  100% { width: 1800px; height: 1800px; opacity: 0; border-color: oklch(0.45 0.22 262 / 0); }
}

.static-rings {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.static-rings::before, .static-rings::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 1px dashed oklch(0.65 0.18 260 / 0.12);
}
.static-rings::before { width: 600px; height: 600px; }
.static-rings::after { width: 1000px; height: 1000px; }

.center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.logo-wrap {
  padding: 24px 32px;
  background: oklch(0.10 0.03 260 / 0.7);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid oklch(0.7 0.18 262 / 0.35);
  border-radius: 4px;
  box-shadow:
    0 0 80px oklch(0.45 0.22 262 / 0.4),
    inset 0 1px 0 oklch(1 0 0 / 0.06);
}
.logo-wrap img { width: 280px; max-width: 60vw; }
.tagline {
  font-family: 'Italiana', serif;
  font-style: italic;
  font-size: var(--t-lg);
  color: oklch(0.85 0.06 258);
  letter-spacing: 0.03em;
}

.brand-marker {
  position: absolute;
  z-index: 12;
  text-decoration: none; color: var(--paper);
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: oklch(0.10 0.03 260 / 0.7);
  border: 1px solid oklch(0.7 0.18 262 / 0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 100px;
  font-family: 'Italiana', serif;
  font-size: 14px;
  transition: all 0.6s var(--ease-out-quart);
}
.brand-marker:hover {
  border-color: oklch(0.7 0.18 262 / 0.7);
  box-shadow: 0 0 32px oklch(0.45 0.22 262 / 0.5);
  transform: scale(1.05);
}
.brand-marker .indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c, var(--malory-light));
  box-shadow: 0 0 8px var(--c, var(--malory-light));
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.6 } 50% { opacity: 1; transform: scale(1.4) } }

.m-connect { top: 32%; left: 22%; --c: var(--c-connect); }
.m-oxepay { top: 28%; right: 24%; --c: var(--c-oxepay); }
.m-wowlog { bottom: 24%; left: 16%; --c: var(--c-wowlog); }
.m-entret { bottom: 30%; right: 16%; --c: var(--c-entret); }
.m-iai { top: 52%; right: 8%; --c: var(--c-iai); }

.eyebrow-top {
  position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
  color: oklch(0.7 0.08 258); z-index: 20;
}
.foot {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.4em;
  color: oklch(0.55 0.06 258);
  text-transform: uppercase;
  z-index: 20;
}

@media (max-width: 800px) {
  .logo-wrap img { width: 200px; }
  .brand-marker { font-size: 12px; padding: 6px 10px; }
  .static-rings::before { width: 380px; height: 380px; }
  .static-rings::after { width: 600px; height: 600px; }
  .m-connect { top: 20%; left: 6% }
  .m-oxepay { top: 18%; right: 6% }
  .m-wowlog { bottom: 18%; left: 6% }
  .m-entret { bottom: 22%; right: 6% }
  .m-iai { top: 44%; right: 4% }
}
</style>
</head>
<body>

<nav class="version-nav"><a href="../index.html">×</a><a href="../v01/index.html">01</a><a href="../v02/index.html">02</a><a href="../v03/index.html">03</a><a href="../v04/index.html">04</a><a href="../v05/index.html">05</a><a href="../v06/index.html">06</a><a href="../v07/index.html">07</a><a href="../v08/index.html">08</a><a href="../v09/index.html">09</a><a href="../v10/index.html">10</a></nav>

<section class="wave">
  <div class="static-rings"></div>
  <div class="ripples">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div>
  </div>
  <div class="eyebrow-top eyebrow fade-in">— ondas que se propagam</div>

  <div class="center">
    <div class="logo-wrap fade-in"><img src="../assets/logos/grupo-malory.png" alt="Grupo Malory"></div>
    <div class="tagline fade-in">Tudo ressoa do centro</div>
  </div>

  <a href="https://maloryconnect.com" class="brand-marker m-connect"><span class="indicator"></span>Malory Connect</a>
  <a href="https://useoxepay.com.br" class="brand-marker m-oxepay"><span class="indicator"></span>OxePay</a>
  <a href="https://wowlognow.com" class="brand-marker m-wowlog"><span class="indicator"></span>WowLog</a>
  <a href="https://entretenimento.grupomalory.com" class="brand-marker m-entret"><span class="indicator"></span>Malory Entretenimento</a>
  <a href="https://iai.grupomalory.com" class="brand-marker m-iai"><span class="indicator"></span>Iaí</a>

  <div class="foot fade-in">cinco frequências · um sinal</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="../shared/init.js"></script>
<script>
gsap.from('.brand-marker', { opacity: 0, scale: 0.7, duration: 1.4, stagger: 0.15, delay: 0.8, ease: 'expo.out' });
</script>
</body>
</html>
