<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>v08 · Vintage Compass — Grupo Malory</title>
<link rel="stylesheet" href="../shared/base.css">
<style>
body { background: oklch(0.13 0.03 80); color: oklch(0.92 0.04 80); }
.compass-page {
  position: relative; width: 100vw; height: 100vh; overflow: hidden;
  background:
    radial-gradient(ellipse at center, oklch(0.18 0.05 80) 0%, oklch(0.10 0.03 75) 70%, oklch(0.07 0.02 70) 100%);
}
.parchment-grain {
  position: absolute; inset: 0; pointer-events: none;
  opacity: 0.5;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.7 0 0 0 0 0.3 0 0 0 0.06 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  mix-blend-mode: screen;
}

.compass {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 720px; height: 720px; max-width: 90vw; max-height: 90vw;
}
.compass-rose {
  position: absolute; inset: 0;
  animation: roseRotate 120s linear infinite;
}
@keyframes roseRotate { to { transform: rotate(360deg) } }
.compass-rose svg { width: 100%; height: 100%; }

.center-disc {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 10;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, oklch(0.22 0.06 75) 0%, oklch(0.13 0.03 70) 80%);
  border: 1px solid oklch(0.7 0.12 78 / 0.6);
  box-shadow:
    0 0 60px oklch(0.7 0.14 78 / 0.3),
    inset 0 2px 0 oklch(0.85 0.14 78 / 0.4),
    inset 0 -10px 30px oklch(0 0 0 / 0.5);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.center-disc img { width: 170px; filter: brightness(1.05); }

.cardinal {
  position: absolute;
  z-index: 15;
  display: flex; flex-direction: column; align-items: center;
  text-decoration: none; color: oklch(0.92 0.06 78);
  font-family: 'Italiana', serif;
  font-style: italic;
  text-align: center;
  transition: all 0.6s var(--ease-out-quart);
}
.cardinal:hover { transform: var(--hover-transform); color: oklch(0.95 0.16 80); }
.cardinal .deg {
  font-family: 'JetBrains Mono', monospace;
  font-style: normal;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: oklch(0.7 0.12 78 / 0.7);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.cardinal .name {
  font-size: 22px;
  line-height: 1;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.cardinal .domain {
  font-family: 'JetBrains Mono', monospace;
  font-style: normal;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: oklch(0.7 0.12 78 / 0.55);
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.4s;
}
.cardinal:hover .domain { opacity: 1; }

.c-n { top: 6%; left: 50%; transform: translateX(-50%); --hover-transform: translateX(-50%) translateY(-4px); }
.c-s { bottom: 6%; left: 50%; transform: translateX(-50%); --hover-transform: translateX(-50%) translateY(4px); }
.c-e { top: 50%; right: 4%; transform: translateY(-50%); text-align: right; --hover-transform: translateY(-50%) translateX(4px); }
.c-w { top: 50%; left: 4%; transform: translateY(-50%); text-align: left; --hover-transform: translateY(-50%) translateX(-4px); }
.c-ne { top: 18%; right: 14%; --hover-transform: translate(4px,-4px); }

.eyebrow-top {
  position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
  color: oklch(0.7 0.12 78); z-index: 20;
}
.foot {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  font-family: 'Italiana', serif;
  font-style: italic;
  font-size: 14px;
  color: oklch(0.7 0.12 78 / 0.6);
  z-index: 20;
}

@media (max-width: 800px) {
  .compass { width: 460px; height: 460px; }
  .center-disc { width: 160px; height: 160px; }
  .center-disc img { width: 120px; }
  .cardinal .name { font-size: 16px; }
  .c-ne { top: 14%; right: 6% }
}
</style>
</head>
<body>

<nav class="version-nav"><a href="../index.html">×</a><a href="../v01/index.html">01</a><a href="../v02/index.html">02</a><a href="../v03/index.html">03</a><a href="../v04/index.html">04</a><a href="../v05/index.html">05</a><a href="../v06/index.html">06</a><a href="../v07/index.html">07</a><a href="../v08/index.html">08</a><a href="../v09/index.html">09</a><a href="../v10/index.html">10</a></nav>

<section class="compass-page">
  <div class="parchment-grain"></div>

  <div class="eyebrow-top eyebrow fade-in">— rosa dos negócios · cinco direções</div>

  <div class="compass">
    <div class="compass-rose">
      <svg viewBox="0 0 720 720">
        <defs>
          <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
            <stop offset="80%" stop-color="oklch(0.7 0.14 78)" stop-opacity="0"/>
            <stop offset="100%" stop-color="oklch(0.7 0.14 78)" stop-opacity="0.5"/>
          </radialGradient>
        </defs>
        <circle cx="360" cy="360" r="350" fill="none" stroke="oklch(0.7 0.14 78 / 0.4)" stroke-width="1"/>
        <circle cx="360" cy="360" r="320" fill="none" stroke="oklch(0.7 0.14 78 / 0.3)" stroke-width="1" stroke-dasharray="2 4"/>
        <circle cx="360" cy="360" r="280" fill="none" stroke="oklch(0.7 0.14 78 / 0.2)" stroke-width="1"/>
        <!-- Cardinal points -->
        <polygon points="360,40 350,360 370,360" fill="oklch(0.7 0.14 78 / 0.6)"/>
        <polygon points="360,680 350,360 370,360" fill="oklch(0.7 0.14 78 / 0.3)"/>
        <polygon points="40,360 360,350 360,370" fill="oklch(0.7 0.14 78 / 0.3)"/>
        <polygon points="680,360 360,350 360,370" fill="oklch(0.7 0.14 78 / 0.3)"/>
        <!-- NE diagonal -->
        <polygon points="586,134 354,358 366,370" fill="oklch(0.7 0.14 78 / 0.35)"/>
        <!-- Degree marks -->
        <g stroke="oklch(0.7 0.14 78 / 0.5)" stroke-width="1">
          <g id="ticks"></g>
        </g>
      </svg>
    </div>
    <div class="center-disc">
      <img src="../assets/logos/grupo-malory.png" alt="Grupo Malory">
    </div>
  </div>

  <a href="https://maloryconnect.com" class="cardinal c-n">
    <span class="deg">N · 000°</span><span class="name">Malory Connect</span><span class="domain">maloryconnect.com</span>
  </a>
  <a href="https://useoxepay.com.br" class="cardinal c-ne">
    <span class="deg">NE · 045°</span><span class="name">OxePay</span><span class="domain">useoxepay.com.br</span>
  </a>
  <a href="https://wowlognow.com" class="cardinal c-e">
    <span class="deg">L · 090°</span><span class="name">WowLog</span><span class="domain">wowlognow.com</span>
  </a>
  <a href="https://entretenimento.grupomalory.com" class="cardinal c-s">
    <span class="deg">S · 180°</span><span class="name">Malory Entretenimento</span><span class="domain">entretenimento.grupomalory.com</span>
  </a>
  <a href="https://iai.grupomalory.com" class="cardinal c-w">
    <span class="deg">O · 270°</span><span class="name">Iaí</span><span class="domain">iai.grupomalory.com</span>
  </a>

  <div class="foot fade-in">aponte para qualquer direção</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="../shared/init.js"></script>
<script>
// Generate degree tick marks
const ticks = document.getElementById('ticks');
let html = '';
for (let i = 0; i < 72; i++) {
  const a = (i * 5) * Math.PI / 180;
  const r1 = i % 6 === 0 ? 340 : 348;
  const r2 = 354;
  const x1 = 360 + Math.cos(a)*r1;
  const y1 = 360 + Math.sin(a)*r1;
  const x2 = 360 + Math.cos(a)*r2;
  const y2 = 360 + Math.sin(a)*r2;
  html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
}
ticks.innerHTML = html;

gsap.from('.cardinal', { opacity: 0, scale: 0.8, duration: 1.4, stagger: 0.14, delay: 0.7, ease: 'expo.out' });
</script>
</body>
</html>
